<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Word Tetris 手機版</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="top-info">
        <div class="meta">
          <span class="score-chip">分數：<b id="score">0</b></span>
          <span class="progress-chip">進度：<b id="progress">0/0</b></span>
          <div class="meta-actions">
            <button id="autoBtn" type="button" onclick="toggleAutoMode()">自動</button>
            <a class="btn-link" href="./novel.html">📖 小說</a>
            <a class="btn-link" href="./settings.html">⚙ 設定</a>
            <button id="restartBtn" type="button">重新開始</button>
          </div>
        </div>
        <p id="message" class="message"></p>
        <pre id="debugBox" class="debug-box"></pre>
      </header>

      <section class="board-wrap">
        <canvas id="board"></canvas>
      </section>
    </main>

    <nav class="mobile-controls" aria-label="遊戲控制">
      <button id="leftBtn" type="button" aria-label="向左">左</button>
      <button id="downBtn" type="button" aria-label="直接落地">下</button>
      <button id="rightBtn" type="button" aria-label="向右">右</button>
    </nav>

    <script src="./script.js"></script>
  </body>
</html>
