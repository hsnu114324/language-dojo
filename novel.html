<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Word Novel 德文單字小說</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .novel-page {
        width: min(96vw, 460px);
        margin: 0 auto;
        padding: 8px 0 20px;
        font-family: system-ui, sans-serif;
      }

      /* 導航 */
      .novel-nav {
        display: flex;
        gap: 6px;
        justify-content: center;
        padding: 6px 0 10px;
        flex-wrap: wrap;
      }

      /* 發牌Q 進度列 */
      .queue-progress {
        text-align: center;
        font-size: 0.85rem;
        color: #889;
        margin-bottom: 8px;
        padding: 6px 0;
        background: #12162e;
        border: 1px solid #3f4b89;
        border-radius: 8px;
      }
      .queue-progress b { color: #ffcc02; }
      .queue-bar {
        height: 3px;
        background: #1e2348;
        border-radius: 2px;
        margin: 4px 12px 0;
        overflow: hidden;
      }
      .queue-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #5bc0de, #5fd18d);
        border-radius: 2px;
        transition: width 0.4s;
      }

      /* ═══ 配對遊戲區 ═══ */
      .match-area {
        background: #181d3a;
        border: 1px solid #3f4b89;
        border-radius: 12px;
        padding: 14px 10px;
        margin-bottom: 10px;
        text-align: center;
      }
      .match-title {
        font-size: 0.85rem;
        color: #889;
        margin-bottom: 10px;
      }

      /* combo 群組 */
      .match-slots {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .combo-group {
        background: #12162e;
        border: 2px solid #2a2f55;
        border-radius: 10px;
        padding: 8px 6px 6px;
        min-width: 90px;
        transition: border-color 0.3s, background 0.3s;
      }
      .combo-group.correct {
        border-color: #5fd18d;
        background: #1a3a2a;
      }
      /* combo-hint 已移除，hint 做成小卡槽 */

      /* 每個 block 的獨立小卡槽 */
      .block-slot-row {
        display: flex;
        gap: 4px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .block-slot {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #1a1f3d;
        border: 2px dashed #3f4b89;
        border-radius: 6px;
        padding: 6px 14px;
        min-width: 52px;
        min-height: 38px;
        font-size: 0.9rem;
        font-weight: 600;
        color: #556;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
      }
      .block-slot:active { transform: scale(0.95); }
      .block-slot.highlight {
        border-color: #5bc0de;
        background: #1a2548;
        box-shadow: 0 0 6px rgba(91,192,222,0.3);
      }
      .block-slot.drop-target {
        border-color: #ffcc02 !important;
        background: #2a2820 !important;
        transform: scale(1.08);
        box-shadow: 0 0 10px rgba(255,204,2,0.4);
      }
      .block-slot.prefilled {
        background: #1e2a45;
        border-color: #5bc0de;
        border-style: solid;
        color: #8bc6e0;
        font-weight: 700;
        cursor: default;
        opacity: 0.85;
      }
      .block-slot.filled {
        background: #1a3a2a;
        border-color: #5fd18d;
        border-style: solid;
        color: #5fd18d;
        font-weight: 700;
        cursor: default;
      }
      .block-slot.wrong-flash {
        animation: slotWrong 0.4s ease;
      }
      @keyframes slotWrong {
        0%, 100% { border-color: #3f4b89; }
        50% { border-color: #ff5555; background: #3a1a1a; }
      }

      /* 回饋訊息 */
      .match-feedback {
        font-size: 0.95rem;
        min-height: 1.4rem;
        margin: 6px 0 10px;
        font-weight: 600;
        color: #aab;
        transition: color 0.3s;
      }

      /* 答案卡片列 */
      .match-cards {
        display: flex;
        gap: 6px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .match-card {
        background: #2a2f55;
        border: 2px solid #3f4b89;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 0.95rem;
        font-weight: 700;
        color: #dde;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
        -webkit-user-select: none;
      }
      .match-card:active { transform: scale(0.95); }
      .match-card.dragging {
        opacity: 0.3;
      }
      .match-card.selected {
        border-color: #ffcc02;
        background: #3a3520;
        color: #ffcc02;
        box-shadow: 0 0 10px rgba(255,204,2,0.3);
      }
      .match-card.matched {
        opacity: 0.3;
        pointer-events: none;
        border-color: #5fd18d;
        color: #5fd18d;
      }
      .match-card.wrong-flash {
        animation: cardWrong 0.4s ease;
      }
      @keyframes cardWrong {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
      }

      /* 拖曳中的幽靈卡片 */
      .match-ghost {
        position: fixed;
        z-index: 9999;
        pointer-events: none;
        background: #3a3520;
        border: 2px solid #ffcc02;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 0.95rem;
        font-weight: 700;
        color: #ffcc02;
        box-shadow: 0 4px 16px rgba(255,204,2,0.3);
        transform: translate(-50%, -50%);
        white-space: nowrap;
      }
      /* (drop-target 已移至 .block-slot.drop-target) */

      /* 統計 */
      .match-stats {
        font-size: 0.85rem;
        color: #889;
        margin-top: 8px;
      }

      /* ═══ ATB 戰鬥區 ═══ */
      .battle-area {
        background: #12162e;
        border: 1px solid #3f4b89;
        border-radius: 12px;
        padding: 12px 10px;
        margin-bottom: 10px;
        display: flex;
        align-items: flex-start;
        gap: 6px;
        position: relative;
        overflow: hidden;
      }
      .combatant {
        flex: 1;
        min-width: 0;
      }
      .combatant-name {
        font-size: 0.85rem;
        font-weight: 700;
        margin-bottom: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .player-side .combatant-name { color: #5fd18d; }
      .enemy-side .combatant-name  { color: #ff6b6b; }

      /* HP 條 */
      .hp-row, .atb-row {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-bottom: 3px;
      }
      .hp-label, .atb-label {
        font-size: 0.65rem;
        font-weight: 700;
        width: 26px;
        text-align: right;
        flex-shrink: 0;
      }
      .hp-label { color: #ff6b6b; }
      .atb-label { color: #5bc0de; }
      .hp-bar, .atb-bar {
        flex: 1;
        height: 10px;
        background: #1a1f3d;
        border-radius: 5px;
        overflow: hidden;
        position: relative;
      }
      .hp-fill, .atb-fill {
        height: 100%;
        border-radius: 5px;
        transition: width 0.3s ease;
      }
      .player-hp { background: linear-gradient(90deg, #2a7a4a, #5fd18d); }
      .enemy-hp  { background: linear-gradient(90deg, #8a2a2a, #ff6b6b); }
      .player-atb { background: linear-gradient(90deg, #1a6090, #5bc0de); }
      .enemy-atb  { background: linear-gradient(90deg, #6a3a80, #c77dff); }
      .atb-fill.full { animation: atbPulse 0.4s ease-in-out 2; }
      @keyframes atbPulse {
        50% { filter: brightness(1.5); }
      }
      .hp-text {
        font-size: 0.65rem;
        color: #889;
        width: 48px;
        text-align: right;
        flex-shrink: 0;
      }

      /* VS */
      .battle-vs {
        font-size: 0.9rem;
        font-weight: 900;
        color: #ff8844;
        align-self: center;
        flex-shrink: 0;
        text-shadow: 0 0 8px rgba(255,136,68,0.5);
      }

      /* 波次 / 戰鬥資訊 */
      .wave-info {
        text-align: center;
        font-size: 0.75rem;
        color: #667;
        margin-top: 4px;
      }
      .wave-info b { color: #ffcc02; }

      /* 戰鬥日誌 */
      .battle-log {
        text-align: center;
        min-height: 1.4rem;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 6px;
        color: #aab;
        transition: color 0.3s;
      }

      /* 飄字傷害 */
      .dmg-float {
        position: absolute;
        font-weight: 900;
        font-size: 1.2rem;
        pointer-events: none;
        animation: dmgFloat 1s ease-out forwards;
        z-index: 10;
        text-shadow: 0 1px 4px rgba(0,0,0,0.7);
      }
      .dmg-float.player-hit { color: #ff6b6b; }
      .dmg-float.enemy-hit  { color: #5fd18d; }
      .dmg-float.heal        { color: #5bc0de; }
      @keyframes dmgFloat {
        0%   { opacity: 1; transform: translateY(0) scale(1); }
        60%  { opacity: 1; transform: translateY(-30px) scale(1.2); }
        100% { opacity: 0; transform: translateY(-50px) scale(0.8); }
      }

      /* 搖晃 */
      .shake { animation: shakeAnim 0.3s ease; }
      @keyframes shakeAnim {
        0%, 100% { transform: translateX(0); }
        25%      { transform: translateX(-4px); }
        75%      { transform: translateX(4px); }
      }

      /* KO 閃爍 */
      .ko-flash { animation: koFlash 0.6s ease; }
      @keyframes koFlash {
        0%, 100% { opacity: 1; }
        25%, 75% { opacity: 0.2; }
        50% { opacity: 0.8; }
      }

      /* 資訊列 */
      .novel-info {
        text-align: center;
        color: #aab;
        font-size: 0.9rem;
        margin-top: 6px;
      }
      .novel-info b { color: #ffcc02; }
    </style>
  </head>
  <body style="background:#0f1222;color:#eee;">

    <div class="novel-page">
      <!-- 導航 -->
      <nav class="novel-nav">
        <a class="btn-link" href="./index.html">🧱 方塊</a>
        <a class="btn-link" href="./settings.html">⚙ 設定</a>
        <button id="autoPlayBtn" style="padding:4px 12px;font-size:0.85rem;border-radius:6px;border:1px solid #3f4b89;background:#1a1f3d;color:#ccd;cursor:pointer;">🤖 自動</button>
        <button id="restartBtn" style="padding:4px 12px;font-size:0.85rem;border-radius:6px;border:1px solid #3f4b89;background:#1a1f3d;color:#ccd;cursor:pointer;">🔄 重新開始</button>
      </nav>

      <!-- 發牌Q 進度 -->
      <div class="queue-progress" id="queueProgress">
        發牌Q：第 0/0 組 ｜ 已配對 0
      </div>

      <!-- 配對遊戲區 -->
      <section class="match-area">
        <div class="match-title">將德文卡片拖入正確的小卡槽（💡 藍色格為提示）</div>
        <div class="match-slots" id="matchSlots"></div>
        <div class="match-feedback" id="matchFeedback">&nbsp;</div>
        <div class="match-cards" id="matchCards"></div>
        <div class="match-stats" id="matchStats">配對 0 / 錯誤 0</div>
      </section>

      <!-- ATB 戰鬥區 -->
      <section class="battle-area" id="battleArea">
        <div class="combatant player-side">
          <div class="combatant-name">⚔️ 勇者</div>
          <div class="hp-row">
            <span class="hp-label">HP</span>
            <div class="hp-bar"><div class="hp-fill player-hp" id="playerHpFill" style="width:100%"></div></div>
            <span class="hp-text" id="playerHpText">100/100</span>
          </div>
          <div class="atb-row">
            <span class="atb-label">ATB</span>
            <div class="atb-bar"><div class="atb-fill player-atb" id="playerAtbFill" style="width:0%"></div></div>
          </div>
        </div>

        <div class="battle-vs">⚡</div>

        <div class="combatant enemy-side" id="enemySide">
          <div class="combatant-name" id="enemyName">👹 魔族士兵</div>
          <div class="hp-row">
            <span class="hp-label">HP</span>
            <div class="hp-bar"><div class="hp-fill enemy-hp" id="enemyHpFill" style="width:100%"></div></div>
            <span class="hp-text" id="enemyHpText">50/50</span>
          </div>
          <div class="atb-row">
            <span class="atb-label">ATB</span>
            <div class="atb-bar"><div class="atb-fill enemy-atb" id="enemyAtbFill" style="width:0%"></div></div>
          </div>
        </div>
      </section>
      <div class="wave-info">
        第 <b id="waveNum">1</b> 波 ｜ 擊殺 <b id="killCount">0</b>
      </div>
      <div class="battle-log" id="battleLog">&nbsp;</div>

      <!-- 資訊 -->
      <div class="novel-info">
        配對：<b id="correctEl">0</b> ｜
        連續：<b id="streakEl">0</b>
      </div>
    </div>

    <script src="./novel.js"></script>
  </body>
</html>
