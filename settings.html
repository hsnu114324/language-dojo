<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>資料表編輯</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8506212526511190" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <main class="settings-page">
      <section class="card">
        <h1>編輯資料表 <span class="version-tag">v9.0</span></h1>
        <p>格式：每列用逗號分隔，限制 2~5 欄（例如：<code>new,york,city</code>）。</p>
        <p id="message" class="message"></p>

        <div class="pick-section">
          <label class="pick-label">
            每局隨機抽取
            <input id="pickCount" type="number" min="0" step="1" value="0" />
            組（共 <b id="totalCount">0</b> 組，0 = 全部）
          </label>
        </div>

        <div class="pick-section" style="text-align:center;">
          <button type="button" id="singleWordModeBtn"
            style="width:100%;padding:14px 0;font-size:1.05rem;font-weight:700;
                   border:2px solid #666;border-radius:10px;
                   background:#2a2a2a;color:#ccc;cursor:pointer;
                   transition:background 0.15s,box-shadow 0.2s,color 0.15s,border-color 0.15s,transform 0.1s;">
            🔤 單字模式
          </button>
          <p id="singleWordModeHint" style="margin:6px 0 0;font-size:0.78rem;color:#999;display:none;">
            一次只發一組單字，拼對消去後才發下一組。自定義來源自動啟用，組合長度由拆字決定。
          </p>
          <div id="splitModeBar" style="display:flex;gap:6px;margin-top:10px;justify-content:center;">
            <button type="button" class="split-mode-btn" data-split="syllable"
              style="flex:1;padding:9px 0;font-size:0.85rem;font-weight:600;
                     border:2px solid #666;border-radius:8px;
                     background:#2a2a2a;color:#ccc;cursor:pointer;
                     transition:background 0.15s,box-shadow 0.2s,color 0.15s,border-color 0.15s;">
              音節拆分
            </button>
            <button type="button" class="split-mode-btn" data-split="random"
              style="flex:1;padding:9px 0;font-size:0.85rem;font-weight:600;
                     border:2px solid #666;border-radius:8px;
                     background:#2a2a2a;color:#ccc;cursor:pointer;
                     transition:background 0.15s,box-shadow 0.2s,color 0.15s,border-color 0.15s;">
              隨機拆分
            </button>
            <button type="button" class="split-mode-btn" data-split="mixed"
              style="flex:1;padding:9px 0;font-size:0.85rem;font-weight:600;
                     border:2px solid #666;border-radius:8px;
                     background:#2a2a2a;color:#ccc;cursor:pointer;
                     transition:background 0.15s,box-shadow 0.2s,color 0.15s,border-color 0.15s;">
              混合
            </button>
          </div>
        </div>

        <div id="lenSection" class="pick-section">
          <p class="pick-label" style="margin-bottom:6px;font-weight:bold;">允許的組合長度</p>
          <label class="pick-label" style="display:block;padding:10px 0;"><input id="len2Toggle" type="checkbox" checked style="width:20px;height:20px;vertical-align:middle;margin-right:8px;" /> 2 格</label>
          <label class="pick-label" style="display:block;padding:10px 0;"><input id="len3Toggle" type="checkbox" checked style="width:20px;height:20px;vertical-align:middle;margin-right:8px;" /> 3 格</label>
          <label class="pick-label" style="display:block;padding:10px 0;"><input id="len4Toggle" type="checkbox" checked style="width:20px;height:20px;vertical-align:middle;margin-right:8px;" /> 4 格</label>
          <label class="pick-label" style="display:block;padding:10px 0;"><input id="len5Toggle" type="checkbox" checked style="width:20px;height:20px;vertical-align:middle;margin-right:8px;" /> 5 格</label>
        </div>

        <div id="sourceSection" class="pick-section">
          <p class="pick-label" style="margin-bottom:6px;font-weight:bold;">單字來源（可同時啟用多個）</p>
          <div id="groupBtnBar" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;">
            <button type="button" class="group-btn" data-group="0">群組 1</button>
            <button type="button" class="group-btn" data-group="1">群組 2</button>
            <button type="button" class="group-btn" data-group="2">群組 3</button>
            <button type="button" class="group-btn" data-group="3">群組 4</button>
            <button type="button" class="group-btn" data-group="4">群組 5</button>
            <button type="button" class="group-btn" id="customSourceBtn">自定義</button>
          </div>
        </div>

        <div class="pick-section">
          <label class="pick-label">
            <input id="autoRemoveToggle" type="checkbox" style="width:20px;height:20px;vertical-align:middle;margin-right:8px;" />
            自動移除模式（消去的組合自動從資料表移除）
          </label>
        </div>

        <div class="pick-section">
          <label class="pick-label">
            <input id="debugToggle" type="checkbox" />
            啟用偵錯模式
          </label>
        </div>

        <div class="pick-section">
          <p class="pick-label" style="margin-bottom:6px;font-weight:bold;">📊 學習統計（Google Sheets 同步）</p>
          <!-- Google 登入 -->
          <div id="googleAuthArea" style="margin-bottom:10px;">
            <div id="googleSignInBtn"></div>
            <div id="googleUserInfo" style="display:none;align-items:center;gap:10px;padding:8px 12px;background:#e8f5e9;border-radius:8px;">
              <img id="googleUserAvatar" alt="" style="width:28px;height:28px;border-radius:50%;" />
              <span id="googleUserName" style="font-size:14px;font-weight:500;"></span>
              <button id="googleSignOutBtn" type="button" style="margin-left:auto;font-size:12px;padding:4px 10px;">登出</button>
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
            <button id="viewStatsBtn" type="button">查看失敗率排行</button>
            <button id="loadFailedBtn" type="button">立即載入</button>
            <button id="clearStatsBtn" type="button" class="danger">清除統計</button>
          </div>
          <div id="statsDisplay" style="display:none;margin-top:8px;max-height:300px;overflow-y:auto;font-size:13px;background:#f9f9f9;border-radius:8px;padding:10px;"></div>
          <div id="failedWordsArea" style="display:none;margin-top:12px;"></div>
        </div>

        <div class="actions">
          <button id="saveBtn" type="button">儲存</button>
          <button id="resetBtn" type="button">還原預設</button>
          <a class="btn-link" href="./index.html">🧱 方塊</a>
          <a class="btn-link" href="./novel.html">📖 小說</a>
        </div>

        <hr style="margin:16px 0;border:none;border-top:1px solid #ddd;" />

        <div id="customInputArea" class="input-group" style="display:none;">
          <input
            id="newRowInput"
            type="text"
            placeholder="輸入新的自定義列，例如：bubble,milk,tea"
          />
          <button id="addBtn" type="button">新增</button>
        </div>

        <div id="rowList" class="row-list"></div>
      </section>
    </main>

    <script src="./settings.js"></script>
  </body>
</html>
